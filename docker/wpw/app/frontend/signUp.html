
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.V.V - Sign Up</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="Fotos/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="theme.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top px-3" id="navbar-example2">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Mathias van vynckt</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto nav nav-pills align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link " href="Login.html"> <i class="bi bi-arrow-left-short"></i> Back </a>
          </li>

          <p>|</p>
          <li class="nav-item">
            <a class="nav-link active" href="signUp.html"> <i class="bi bi-lock-fill"> Exclusive</i></a>
          </li>
         
          <p>|</p>
          
          <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
            <button class="btn btn-outline-secondary" type="button" data-theme-toggle aria-label="Donkere modus wisselen">
              Dark mode
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="animated-bg d-flex justify-content-center align-items-center text-light" style="min-height: 100svh;">
    <section class="signup-card hover-card py-5 px-4 px-md-5 bg-body-tertiary border rounded-4 shadow-sm mx-auto">
      <h1 class="text-center text-body mb-4" X>Sign Up</h1>

      <form class="row g-3" id="signupForm">
        <div class="form-floating col-md-12">
          <input type="text" class="form-control" id="copyFirstName" placeholder=" " required>
          <label for="copyFirstName" class="text-body-secondary">Voornaam</label>
        </div>

        <div class="form-floating col-md-12">
          <input type="text" class="form-control" id="copyLastName" placeholder=" " required>
          <label for="copyLastName" class="text-body-secondary">Achternaam</label>
        </div>

        <div class="form-floating col-md-12">
          <input type="email" class="form-control" id="copyEmail" placeholder=" " required>
          <label for="copyEmail" class="text-body-secondary">E-mailadres</label>
        </div>

        <div class="form-floating col-md-12">
          <input type="password" class="form-control" id="copyPassword" placeholder=" " required>
          <label for="copyPassword" class="text-body-secondary">Wachtwoord</label>
        </div>

        <div id="melding" class="col-12"></div>

        <div class="col-md-12">
          <button type="submit" class="btn btn-primary px-5 w-100">Maak account</button>
        </div>
      </form>
    </section>
  </main>
  <script>
  const form = document.getElementById('signupForm');
  const melding = document.getElementById('melding');

  form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const voornaam = document.getElementById('copyFirstName').value.trim();
    const achternaam = document.getElementById('copyLastName').value.trim();
    const email = document.getElementById('copyEmail').value.trim();
    const wachtwoord = document.getElementById('copyPassword').value;

    const data = {
      voornaam: voornaam,
      achternaam: achternaam,
      email: email,
      wachtwoord: wachtwoord
    };

    try {
      const response = await fetch('http://192.168.50.134:3000/api/accounts', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (!response.ok) {
        melding.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
        return;
      }

      melding.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
      form.reset();
    } catch (error) {
      melding.innerHTML = `<div class="alert alert-danger">De backend is niet bereikbaar.</div>`;
    }
  });
</script>
</body>
</html>
