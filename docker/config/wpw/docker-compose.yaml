services:
  frontend:
    image: nginx:alpine
    container_name: wpw-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /srv/Portfolio/docker/wpw/app/frontend:/usr/share/nginx/html:ro
      - /srv/Portfolio/docker/wpw/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - proxy
      - app_internal

  backend:
    image: node:20-alpine
    container_name: wpw-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      TZ: Europe/Brussels
      PORT: 3000
      DB_HOST: mariadb-wpw
      DB_PORT: 3306
      DB_NAME: app_db
      DB_USER: app_user
      DB_PASSWORD: sterk_wachtwoord
    volumes:
      - /srv/Portfolio/docker/wpw/app/backend:/app
    depends_on:
      - database
    networks:
      - proxy
      - app_internal

  database:
    image: mariadb:11
    container_name: wpw-database
    restart: unless-stopped
    environment:
      TZ: Europe/Brussels
      MARIADB_ROOT_PASSWORD: mariadb123
      MARIADB_DATABASE: app_db
      MARIADB_USER: app_user
      MARIADB_PASSWORD: sterk_wachtwoord
    volumes:
      - /srv/Portfolio/docker/wpw/database/data:/var/lib/mysql
      - /srv/Portfolio/docker/wpw/database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app_internal

networks:
  proxy:
    external: true
  app_internal:
    driver: bridge